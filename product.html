<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product — Aura Botanics</title>
  <meta name="description" content="Explore our clinically proven skincare products." />
  <meta name="theme-color" content="#FDFCF8" />
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
  <link rel="stylesheet" href="index.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>" />
</head>
<body>

  <div id="site-nav"></div>

  <main id="main-content">
    <!-- Breadcrumb -->
    <div class="breadcrumb">
      <div class="container">
        <a href="index.html">Home</a> <span>/</span>
        <a href="shop.html">Shop</a> <span>/</span>
        <span id="bc-name">Product</span>
      </div>
    </div>

    <!-- Product Detail -->
    <section class="pdp">
      <div class="container">
        <div class="pdp-grid">
          <div class="pdp-images">
            <div class="pdp-main-img" id="pdp-main-img"></div>
          </div>
          <div class="pdp-info">
            <span class="pdp-badge" id="pdp-badge"></span>
            <h1 class="pdp-title" id="pdp-title"></h1>
            <div class="pdp-rating" id="pdp-rating"></div>
            <div class="pdp-price" id="pdp-price"></div>
            <p class="pdp-desc" id="pdp-desc"></p>

            <div class="pdp-qty-row">
              <label>Quantity</label>
              <div class="qty-control">
                <button id="qty-minus" aria-label="Decrease quantity">−</button>
                <span id="qty-value">1</span>
                <button id="qty-plus" aria-label="Increase quantity">+</button>
              </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:24px;">
              <button class="btn-primary pdp-add-btn" id="pdp-add-btn" style="width:100%; margin:0;">
                Add to Cart
              </button>
              <button class="btn-primary pdp-buy-btn" id="pdp-buy-btn" style="width:100%; margin:0; background:var(--gold); border-color:var(--gold); color:#fff;">
                Buy Now
              </button>
            </div>

            <div class="pdp-trust-row">
              <span>🚚 Free Shipping</span>
              <span>🔄 60-Day Returns</span>
              <span>🛡️ Secure Checkout</span>
            </div>

            <!-- Accordions -->
            <div class="pdp-accordions">
              <details class="pdp-accordion" open>
                <summary>Key Benefits</summary>
                <ul id="pdp-details" class="check-list"></ul>
              </details>
              <details class="pdp-accordion">
                <summary>How to Use</summary>
                <p id="pdp-howto"></p>
              </details>
              <details class="pdp-accordion">
                <summary>Ingredients</summary>
                <p id="pdp-ingredients"></p>
              </details>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Related Products -->
    <section class="related animate-in">
      <div class="container">
        <div class="section-header">
          <p class="section-eyebrow">Complete Your Routine</p>
          <h2 class="section-title">You May Also Like</h2>
        </div>
        <div class="product-grid related-grid" id="related-grid"></div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <!-- Mobile sticky -->
  <div class="sticky-cart" id="sticky-cart-pdp" style="display:none">
    <div class="sticky-cart-price">
      <span class="current" id="sticky-price"></span>
      <span class="old" id="sticky-old"></span>
    </div>
    <button class="sticky-cart-btn" id="sticky-add-btn">Add to Cart →</button>
  </div>

  <script type="module" src="app.js"></script>

</body>
</html>
